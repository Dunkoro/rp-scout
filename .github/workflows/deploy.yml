name: Deploy to GitHub Pages\n\non: push:\n  branches:\n    - main\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Check out code\n        uses: actions/checkout@v2\n\n      - name: Setup Node.js\n        uses: actions/setup-node@v2\n        with:\n          node-version: '16'\n\n      - name: Install Dependencies\n        run: npm install\n\n      - name: Build Project\n        run: npm run build\n\n      - name: Deploy to GitHub Pages\n        uses: actions/deploy-pages@v2\n        with:\n          github_token: ${{ secrets.GITHUB_TOKEN }}\n          publish_dir: ./dist\n
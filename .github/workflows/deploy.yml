name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - name: Verify Build Output (Smoke Test)
        run: |
          echo "Checking if index.html exists..."
          if [ ! -f dist/index.html ]; then
            echo "Error: index.html was not generated!"
            exit 1
          fi
          
          echo "Verifying base path (/rp-scout/) is present in assets..."
          if ! grep -q "/rp-scout/" dist/index.html; then
            echo "Error: Base path missing! Assets will 404."
            exit 1
          fi
          echo "Build verification passed!"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
